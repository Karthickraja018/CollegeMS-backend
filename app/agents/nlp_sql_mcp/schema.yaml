tables:
  colleges:
    description: "Registered colleges on the platform."
    columns:
      id:
        type: int
        pk: true
        nullable: false
      name:
        type: varchar
        pk: false
        nullable: false
      code:
        type: varchar
        pk: false
        nullable: false
        lookup: true
        lookup_limit: 20
  departments:
    description: "College departments listing."
    columns:
      id:
        type: int
        pk: true
        nullable: false
      college_id:
        type: int
        pk: false
        nullable: false
        fk: "colleges.id"
      name:
        type: varchar
        pk: false
        nullable: false
      code:
        type: varchar
        pk: false
        nullable: false
        lookup: true
        lookup_limit: 20
  programs:
    description: "Academic programs like B.E, MBA, etc."
    columns:
      id:
        type: int
        pk: true
        nullable: false
      department_id:
        type: int
        pk: false
        nullable: false
        fk: "departments.id"
      name:
        type: varchar
        pk: false
        nullable: false
      code:
        type: varchar
        pk: false
        nullable: false
        lookup: true
        lookup_limit: 20
      type:
        type: enum
        pk: false
        nullable: false
        enum_values:
          - ug
          - pg
          - diploma
          - certificate
          - phd
  semesters:
    description: "Academic semesters."
    columns:
      id:
        type: int
        pk: true
        nullable: false
      program_id:
        type: int
        pk: false
        nullable: false
        fk: "programs.id"
      semester_number:
        type: int
        pk: false
        nullable: false
      status:
        type: enum
        pk: false
        nullable: false
        enum_values:
          - upcoming
          - ongoing
          - completed
          - results_published
  users:
    description: "System accounts for admins, principals, HODs, and faculty."
    columns:
      id:
        type: int
        pk: true
        nullable: false
      college_id:
        type: int
        pk: false
        nullable: false
        fk: "colleges.id"
      email:
        type: varchar
        pk: false
        nullable: false
      full_name:
        type: varchar
        pk: false
        nullable: false
      role:
        type: enum
        pk: false
        nullable: false
        enum_values:
          - admin
          - college_admin
          - principal
          - hod
          - faculty
          - staff
          - student
      department_id:
        type: int
        pk: false
        nullable: true
        fk: "departments.id"
      is_active:
        type: boolean
        pk: false
        nullable: false
  students:
    description: "Students registered in the system."
    columns:
      id:
        type: int
        pk: true
        nullable: false
      college_id:
        type: int
        pk: false
        nullable: false
        fk: "colleges.id"
      roll_number:
        type: varchar
        pk: false
        nullable: false
        lookup: true
        lookup_limit: 50
      name:
        type: varchar
        pk: false
        nullable: false
      email:
        type: varchar
        pk: false
        nullable: false
      department_id:
        type: int
        pk: false
        nullable: false
        fk: "departments.id"
      program_id:
        type: int
        pk: false
        nullable: false
        fk: "programs.id"
      current_semester:
        type: int
        pk: false
        nullable: false
      batch:
        type: varchar
        pk: false
        nullable: false
      section:
        type: varchar
        pk: false
        nullable: true
      status:
        type: enum
        pk: false
        nullable: false
        enum_values:
          - active
          - inactive
          - detained
          - arrear
          - lateral_entry
          - transferred_in
          - transferred_out
          - passed_out
          - discontinued
      risk_score:
        type: float
        pk: false
        nullable: true
  subjects:
    description: "Academic courses offered."
    columns:
      id:
        type: int
        pk: true
        nullable: false
      department_id:
        type: int
        pk: false
        nullable: false
        fk: "departments.id"
      program_id:
        type: int
        pk: false
        nullable: false
        fk: "programs.id"
      code:
        type: varchar
        pk: false
        nullable: false
        lookup: true
        lookup_limit: 50
      name:
        type: varchar
        pk: false
        nullable: false
      semester_number:
        type: int
        pk: false
        nullable: false
      credits:
        type: int
        pk: false
        nullable: false
  attendance_records:
    description: "Student daily attendance logs."
    columns:
      id:
        type: int
        pk: true
        nullable: false
      student_id:
        type: int
        pk: false
        nullable: false
        fk: "students.id"
      subject_id:
        type: int
        pk: false
        nullable: false
        fk: "subjects.id"
      semester_id:
        type: int
        pk: false
        nullable: false
        fk: "semesters.id"
      date:
        type: date
        pk: false
        nullable: false
      status:
        type: enum
        pk: false
        nullable: false
        enum_values:
          - present
          - absent
          - od
          - medical_leave
          - duty_leave
  marks_records:
    description: "Academic exam marks achievements."
    columns:
      id:
        type: int
        pk: true
        nullable: false
      student_id:
        type: int
        pk: false
        nullable: false
        fk: "students.id"
      subject_id:
        type: int
        pk: false
        nullable: false
        fk: "subjects.id"
      semester_id:
        type: int
        pk: false
        nullable: false
        fk: "semesters.id"
      exam_type:
        type: enum
        pk: false
        nullable: false
        enum_values:
          - cia1
          - cia2
          - cia3
          - model
          - semester_end
          - practical
          - viva
          - assignment
          - quiz
          - project_review
      marks_obtained:
        type: float
        pk: false
        nullable: false
      max_marks:
        type: float
        pk: false
        nullable: false

  fee_accounts:
    description: "Student fee accounts and balances."
    columns:
      id:
        type: int
        pk: true
        nullable: false
      student_id:
        type: int
        pk: false
        nullable: false
        fk: "students.id"
      category:
        type: varchar
        pk: false
        nullable: false
      total_amount:
        type: float
        pk: false
        nullable: false
      paid_amount:
        type: float
        pk: false
        nullable: false
      balance:
        type: float
        pk: false
        nullable: false
      status:
        type: varchar
        pk: false
        nullable: false
  fee_transactions:
    description: "Payments made towards fee accounts."
    columns:
      id:
        type: int
        pk: true
        nullable: false
      fee_account_id:
        type: int
        pk: false
        nullable: false
        fk: "fee_accounts.id"
      amount:
        type: float
        pk: false
        nullable: false
      payment_mode:
        type: varchar
        pk: false
        nullable: false
      payment_date:
        type: date
        pk: false
        nullable: false
  placement_drives:
    description: "Placement drives conducted by companies."
    columns:
      id:
        type: int
        pk: true
        nullable: false
      company_name:
        type: varchar
        pk: false
        nullable: false
      drive_date:
        type: date
        pk: false
        nullable: false
      ctc_lpa:
        type: float
        pk: false
        nullable: true
  placement_applications:
    description: "Student applications to placement drives."
    columns:
      id:
        type: int
        pk: true
        nullable: false
      student_id:
        type: int
        pk: false
        nullable: false
        fk: "students.id"
      drive_id:
        type: int
        pk: false
        nullable: false
        fk: "placement_drives.id"
      status:
        type: varchar
        pk: false
        nullable: false
